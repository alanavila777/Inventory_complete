---
- name: Linux post-check after reboot
  hosts: all
  become: yes
  gather_facts: yes

  vars:
    precheck_dir: /tmp
    host_id: "{{ ansible_hostname | default(inventory_hostname) }}"

  tasks:

    - name: Validate required pre-check files exist
      ansible.builtin.stat:
        path: "{{ precheck_dir }}/{{ item }}.{{ host_id }}"
      loop:
        - enabled_services
        - mount
        - ps
      register: required_precheck_files
      failed_when: not required_precheck_files.stat.exists

    - name: Check missing filesystems and try to mount them
      ansible.builtin.shell: |
        PRE_MOUNT="{{ precheck_dir }}/mount.{{ host_id }}"

        if [ ! -f "$PRE_MOUNT" ]; then
          echo "Missing pre-check mount file: $PRE_MOUNT"
          exit 1
        fi

        awk '{print $3}' "$PRE_MOUNT" \
        | egrep -v '^/(proc|sys|dev|run|boot|var/lib/docker|var/lib/containers)($|/)' \
        | sort -u \
        | while read mp; do
            [ -z "$mp" ] && continue

            if ! mountpoint -q "$mp"; then
              found_missing=1
              echo "$mp"

              if awk -v mp="$mp" '$0 !~ /^[[:space:]]*#/ && $2 == mp { found=1 } END { exit !found }' /etc/fstab; then
                echo "Trying to mount $mp"
                mount "$mp" 2>&1 && \
                  echo "$mp mounted successfully" || \
                  echo "$mp failed to mount"
              else
                echo "$mp not found in /etc/fstab, skipping"
              fi
            fi
          done
      register: mount_check_summary
      changed_when: false

    - name: Check enabled services and start inactive ones
      ansible.builtin.shell: |
        PRE_SERVICES="{{ precheck_dir }}/enabled_services.{{ host_id }}"

        if [ ! -f "$PRE_SERVICES" ]; then
          echo "Missing pre-check enabled services file: $PRE_SERVICES"
          exit 1
        fi

        while read svc; do
          [ -z "$svc" ] && continue

          case "$svc" in
            *@.service)
              continue
              ;;
            dbus-org.*.service)
              continue
              ;;
          esac

          state=$(systemctl is-active "$svc" 2>/dev/null || true)

          if [ "$state" != "active" ]; then
            svc_type=$(systemctl show "$svc" -p Type --value 2>/dev/null || true)
            result=$(systemctl show "$svc" -p Result --value 2>/dev/null || true)
            exec_status=$(systemctl show "$svc" -p ExecMainStatus --value 2>/dev/null || true)

            if [ "$svc_type" = "oneshot" ] && [ "$result" = "success" ] && [ "$exec_status" = "0" ]; then
              continue
            fi

            if [ "$svc_type" = "dbus" ] && [ "$result" = "success" ]; then
              continue
            fi

            start_output=$(systemctl start "$svc" 2>&1)
            start_rc=$?

            if [ "$start_rc" -ne 0 ]; then
              echo "FAILED: $svc"
              echo "  state: $state"
              echo "  type: $svc_type"
              echo "  result: $result"
              echo "  exec status: $exec_status"
              echo "  start output: $start_output"
            fi
          fi
        done < "$PRE_SERVICES"
      register: service_check_summary
      changed_when: false

    - name: Compare process list before and after reboot
      ansible.builtin.shell: |
        PRE_PS="{{ precheck_dir }}/ps.{{ host_id }}"
        TMP_DIR="$(mktemp -d)"
        trap 'rm -rf "$TMP_DIR"' EXIT

        if [ ! -f "$PRE_PS" ]; then
          echo "Missing pre-check ps file: $PRE_PS"
          exit 1
        fi

        awk '{$2=""; $3=""; $4=""; $5=""; $6=""; $7=""; $8=""; print $0}' "$PRE_PS" | sort -u > "$TMP_DIR/ps_before"
        ps -ef | awk '{$2=""; $3=""; $4=""; $5=""; $6=""; $7=""; $8=""; print $0}' | sort -u > "$TMP_DIR/ps_after"

        comm -23 "$TMP_DIR/ps_before" "$TMP_DIR/ps_after"
      register: process_check_summary
      changed_when: false
      failed_when: false

    - name: Check Docker containers from pre-check
      ansible.builtin.shell: |
        PRE_DOCKER="{{ precheck_dir }}/docker_containers.{{ host_id }}"

        if [ ! -f "$PRE_DOCKER" ]; then
          exit 0
        fi

        if ! command -v docker >/dev/null 2>&1; then
          echo "FAILED: Docker containers were recorded during pre-check, but docker command is not available now"
          exit 0
        fi

        if ! docker info >/dev/null 2>&1; then
          echo "FAILED: Docker containers were recorded during pre-check, but Docker daemon is not available now"
          exit 0
        fi

        while read cid cname; do
          [ -z "$cid" ] && continue

          if docker ps --format '{{ "{{" }}.ID{{ "}}" }} {{ "{{" }}.Names{{ "}}" }}' | awk -v id="$cid" -v name="$cname" '$1 == id || $2 == name { found=1 } END { exit !found }'; then
            true
          else
            start_output=$(docker start "$cid" 2>&1 || docker start "$cname" 2>&1)
            start_rc=$?

            if [ "$start_rc" -ne 0 ]; then
              echo "FAILED: Docker container $cname is not running and could not be started"
              echo "  id: $cid"
              echo "  start output: $start_output"
            fi
          fi
        done < "$PRE_DOCKER"
      register: docker_check_summary
      changed_when: false
      failed_when: false

    - name: Check Podman containers from pre-check
      ansible.builtin.shell: |
        PRE_PODMAN="{{ precheck_dir }}/podman_containers.{{ host_id }}"

        if [ ! -f "$PRE_PODMAN" ]; then
          exit 0
        fi

        if ! command -v podman >/dev/null 2>&1; then
          echo "FAILED: Podman containers were recorded during pre-check, but podman command is not available now"
          exit 0
        fi

        while read cid cname; do
          [ -z "$cid" ] && continue

          if podman ps --format '{{ "{{" }}.ID{{ "}}" }} {{ "{{" }}.Names{{ "}}" }}' | awk -v id="$cid" -v name="$cname" '$1 == id || $2 == name { found=1 } END { exit !found }'; then
            true
          else
            start_output=$(podman start "$cid" 2>&1 || podman start "$cname" 2>&1)
            start_rc=$?

            if [ "$start_rc" -ne 0 ]; then
              echo "FAILED: Podman container $cname is not running and could not be started"
              echo "  id: $cid"
              echo "  start output: $start_output"
            fi
          fi
        done < "$PRE_PODMAN"
      register: podman_check_summary
      changed_when: false
      failed_when: false

    - name: Show mount failures
      ansible.builtin.debug:
        var: mount_check_summary.stdout_lines
      when: mount_check_summary.stdout | length > 0

    - name: Show service failures
      ansible.builtin.debug:
        var: service_check_summary.stdout_lines
      when: service_check_summary.stdout | length > 0

    - name: Show process differences
      ansible.builtin.debug:
        var: process_check_summary.stdout_lines
      when: process_check_summary.stdout | length > 0

    - name: Show Docker failures
      ansible.builtin.debug:
        var: docker_check_summary.stdout_lines
      when: docker_check_summary.stdout | length > 0

    - name: Show Podman failures
      ansible.builtin.debug:
        var: podman_check_summary.stdout_lines
      when: podman_check_summary.stdout | length > 0
