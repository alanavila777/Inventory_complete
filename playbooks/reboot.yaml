---
- name: Reboot Linux servers using shell
  hosts: all
  become: yes
  gather_facts: yes

  vars:
    reboot_wait_host: "{{ ansible_host | default(inventory_hostname) }}"
    reboot_down_timeout: 300
    reboot_up_timeout: 1800
    ssh_stabilize_timeout: 600

  tasks:

    - name: Trigger reboot
      ansible.builtin.shell: |
        shutdown -r now "Reboot initiated by Ansible"
      async: 1
      poll: 0
      ignore_errors: true

    - name: Wait for server to go down
      ansible.builtin.wait_for:
        host: "{{ reboot_wait_host }}"
        port: 22
        state: stopped
        delay: 5
        timeout: "{{ reboot_down_timeout }}"
      delegate_to: localhost

    - name: Wait for server to come back
      ansible.builtin.wait_for:
        host: "{{ reboot_wait_host }}"
        port: 22
        state: started
        delay: 30
        timeout: "{{ reboot_up_timeout }}"
      delegate_to: localhost

    - name: Wait for Ansible SSH connection to stabilize
      ansible.builtin.wait_for_connection:
        delay: 15
        timeout: "{{ ssh_stabilize_timeout }}"

    - name: Validate server after reboot
      ansible.builtin.shell: |
        hostname
        uptime
        uname -r
      register: reboot_status
      changed_when: false

    - name: Show reboot status
      ansible.builtin.debug:
        var: reboot_status.stdout_lines
