---
- name: Linux pre-check and kernel update
  hosts: all
  become: yes
  gather_facts: yes

  vars:
    precheck_dir: /tmp
    host_id: "{{ ansible_hostname | default(inventory_hostname) }}"

  tasks:

    - name: Save running services
      ansible.builtin.shell: |
        systemctl list-units --type=service --state=running \
        > {{ precheck_dir }}/services_running.{{ host_id }}
      changed_when: false

    - name: Save netstat output
      ansible.builtin.shell: |
        netstat -tulpn \
        > {{ precheck_dir }}/netstat.{{ host_id }} 2>/dev/null || true
      changed_when: false

    - name: Save ss output
      ansible.builtin.shell: |
        ss -tulpn \
        > {{ precheck_dir }}/ss.{{ host_id }} 2>/dev/null || true
      changed_when: false

    - name: Install latest UEK kernel on OL8/OL9 using dnf
      ansible.builtin.shell: |
        dnf install -y kernel-uek
      when:
        - ansible_distribution == "OracleLinux"
        - ansible_distribution_major_version | int >= 8

    - name: Install latest UEK kernel on OL7 using yum
      ansible.builtin.shell: |
        yum install -y kernel-uek
      when:
        - ansible_distribution == "OracleLinux"
        - ansible_distribution_major_version | int == 7

    - name: Validate generated files
      ansible.builtin.shell: |
        ls -lh \
        {{ precheck_dir }}/services_running.{{ host_id }} \
        {{ precheck_dir }}/netstat.{{ host_id }} \
        {{ precheck_dir }}/ss.{{ host_id }}
      register: precheck_files
      changed_when: false

    - name: Show generated files
      ansible.builtin.debug:
        var: precheck_files.stdout_lines